name: Nightly Regression

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-regression
  cancel-in-progress: false

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      REGRESSION_ALERT_TOKEN: ${{ secrets.REGRESSION_ALERT_TOKEN }}
      REGRESSION_ALERT_EMAILS: ${{ secrets.REGRESSION_ALERT_EMAILS }}
      REGRESSION_ALERT_PHONES: ${{ secrets.REGRESSION_ALERT_PHONES }}
      NOTIFY_EMAIL_PROVIDER: ${{ secrets.NOTIFY_EMAIL_PROVIDER }}
      NOTIFY_SMS_PROVIDER: ${{ secrets.NOTIFY_SMS_PROVIDER }}
      NOTIFY_WHATSAPP_PROVIDER: ${{ secrets.NOTIFY_WHATSAPP_PROVIDER }}
      NOTIFY_EMAIL_WEBHOOK_URL: ${{ secrets.NOTIFY_EMAIL_WEBHOOK_URL }}
      NOTIFY_EMAIL_WEBHOOK_TOKEN: ${{ secrets.NOTIFY_EMAIL_WEBHOOK_TOKEN }}
      NOTIFY_WHATSAPP_WEBHOOK_URL: ${{ secrets.NOTIFY_WHATSAPP_WEBHOOK_URL }}
      NOTIFY_WHATSAPP_WEBHOOK_TOKEN: ${{ secrets.NOTIFY_WHATSAPP_WEBHOOK_TOKEN }}
      NOTIFY_SMS_WEBHOOK_URL: ${{ secrets.NOTIFY_SMS_WEBHOOK_URL }}
      NOTIFY_SMS_WEBHOOK_TOKEN: ${{ secrets.NOTIFY_SMS_WEBHOOK_TOKEN }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
      TWILIO_SMS_FROM: ${{ secrets.TWILIO_SMS_FROM }}
      TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
      META_WHATSAPP_TOKEN: ${{ secrets.META_WHATSAPP_TOKEN }}
      META_WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.META_WHATSAPP_PHONE_NUMBER_ID }}
      REGRESSION_BASE_URL: http://127.0.0.1:3001

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          echo "install-dependencies" > /tmp/nightly-regression-stage
          npm ci

      - name: Generate Prisma client
        run: |
          echo "generate-prisma-client" > /tmp/nightly-regression-stage
          npm run db:generate

      - name: Verify required secrets
        run: |
          echo "verify-required-secrets" > /tmp/nightly-regression-stage
          test -n "$DATABASE_URL"
          test -n "$DIRECT_URL"
          test -n "$JWT_SECRET"

      - name: Seed database
        run: |
          echo "seed-database" > /tmp/nightly-regression-stage
          npm run db:seed

      - name: Start app
        run: |
          echo "start-app" > /tmp/nightly-regression-stage
          npm run dev > /tmp/jiedai-dev.log 2>&1 &
          echo $! > /tmp/jiedai-dev.pid

      - name: Wait for app
        run: |
          echo "wait-for-app" > /tmp/nightly-regression-stage
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3001/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time"
          cat /tmp/jiedai-dev.log || true
          exit 1

      - name: Run full regression
        run: |
          echo "full-regression" > /tmp/nightly-regression-stage
          npm run test:regression

      - name: Run launch readiness smoke
        run: |
          echo "launch-readiness" > /tmp/nightly-regression-stage
          npm run test:launch-readiness

      - name: Run external touchpoints smoke
        run: |
          echo "external-touchpoints" > /tmp/nightly-regression-stage
          npm run test:external-touchpoints

      - name: Run finance reconciliation smoke
        run: |
          echo "finance-reconciliation" > /tmp/nightly-regression-stage
          npm run test:finance-reconciliation

      - name: Send failure alerts
        if: failure()
        run: |
          if [ -z "$REGRESSION_ALERT_TOKEN" ]; then
            echo "REGRESSION_ALERT_TOKEN is not configured, skipping alert callback."
            exit 0
          fi

          failed_stage=$(cat /tmp/nightly-regression-stage 2>/dev/null || echo "unknown")
          summary="Nightly regression workflow failed at stage: $failed_stage. Check uploaded app log artifact and workflow run details."
          triggered_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          payload=$(cat <<JSON
          {
            "status": "FAILED",
            "workflow": "${{ github.workflow }}",
            "repository": "${{ github.repository }}",
            "branch": "${{ github.ref_name }}",
            "sha": "${{ github.sha }}",
            "actor": "${{ github.actor }}",
            "runId": "${{ github.run_id }}",
            "runNumber": "${{ github.run_number }}",
            "runUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "failedJob": "$failed_stage",
            "summary": "$summary",
            "triggeredAt": "$triggered_at"
          }
          JSON
          )

          curl -fsS -X POST "http://127.0.0.1:3001/api/internal/regression-alerts" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $REGRESSION_ALERT_TOKEN" \
            -d "$payload"

      - name: Upload app log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-regression-app-log
          path: /tmp/jiedai-dev.log

      - name: Stop app
        if: always()
        run: |
          if [ -f /tmp/jiedai-dev.pid ]; then
            kill $(cat /tmp/jiedai-dev.pid) || true
          fi
