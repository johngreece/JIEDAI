name: Nightly Regression

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-regression
  cancel-in-progress: false

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      REGRESSION_ALERT_TOKEN: ${{ secrets.REGRESSION_ALERT_TOKEN }}
      REGRESSION_BASE_URL: http://127.0.0.1:3001

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Verify required secrets
        run: |
          test -n "$DATABASE_URL"
          test -n "$DIRECT_URL"
          test -n "$JWT_SECRET"

      - name: Seed database
        run: npm run db:seed

      - name: Start app
        run: |
          npm run dev > /tmp/jiedai-dev.log 2>&1 &
          echo $! > /tmp/jiedai-dev.pid

      - name: Wait for app
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3001/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time"
          cat /tmp/jiedai-dev.log || true
          exit 1

      - name: Run regression
        run: npm run test:regression

      - name: Send failure alerts
        if: failure()
        run: |
          if [ -z "$REGRESSION_ALERT_TOKEN" ]; then
            echo "REGRESSION_ALERT_TOKEN is not configured, skipping alert callback."
            exit 0
          fi

          summary="Nightly regression workflow failed. Check uploaded app log artifact and workflow run details."
          triggered_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          payload=$(cat <<JSON
          {
            "status": "FAILED",
            "workflow": "${{ github.workflow }}",
            "repository": "${{ github.repository }}",
            "branch": "${{ github.ref_name }}",
            "sha": "${{ github.sha }}",
            "actor": "${{ github.actor }}",
            "runId": "${{ github.run_id }}",
            "runNumber": "${{ github.run_number }}",
            "runUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "failedJob": "regression",
            "summary": "$summary",
            "triggeredAt": "$triggered_at"
          }
          JSON
          )

          curl -fsS -X POST "http://127.0.0.1:3001/api/internal/regression-alerts" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $REGRESSION_ALERT_TOKEN" \
            -d "$payload"

      - name: Upload app log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-regression-app-log
          path: /tmp/jiedai-dev.log

      - name: Stop app
        if: always()
        run: |
          if [ -f /tmp/jiedai-dev.pid ]; then
            kill $(cat /tmp/jiedai-dev.pid) || true
          fi
